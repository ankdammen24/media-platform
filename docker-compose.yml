services:
  api:
    build:
      context: ./music-catalog-core
      dockerfile: Dockerfile.api
    env_file:
      - ./music-catalog-core/.env
    environment:
      CORS_ORIGIN: ${FRONTEND_ORIGIN:-https://catalogusmusicus.mediarosenqvist.com}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_prod_password_change_me
      POSTGRES_DB: music_catalog
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  frontend:
    build:
      context: ./soundloom-core
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.mediarosenqvist.com}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
